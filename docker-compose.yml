version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: krotvpn-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-krotvpn}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-krotvpn_secret}
      POSTGRES_DB: ${DB_NAME:-krotvpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-krotvpn}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krotvpn-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: krotvpn-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krotvpn-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krotvpn-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-krotvpn}:${DB_PASSWORD:-krotvpn_secret}@db:5432/${DB_NAME:-krotvpn}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - /etc/amnezia/amneziawg:/etc/amnezia/amneziawg
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - krotvpn-network

  # Frontend User Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: krotvpn-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - krotvpn-network

  # Admin Panel
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: krotvpn-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - krotvpn-network

  # Telegram Bot (optional - enable with --profile telegram)
  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: krotvpn-telegram
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - krotvpn-network
    profiles:
      - telegram

volumes:
  postgres_data:
  redis_data:

networks:
  krotvpn-network:
    driver: bridge
